<html>
<head>
<meta charset="UTF-8">
<title>Focus Test</title>
</head>

<body style="background-color: rgb(254,224,163); text-align:center;">

<h1>Results<br>Please copy paste this into the google form :]</h1>
<img src="m.jpg" style="max-width:120px">

<h2>Frolicsome Average Reaction Time (FART)</h2>
<p><span id="avgRT"></span></p>

<h2>Stroop Test</h2>
<pre id="stroop"></pre>

<h2>nback wawa</h2>
<p id="nbackscore"></p>

<script>
let reaction = JSON.parse(sessionStorage.getItem("reactionResults"))
//FART
if(reaction){

    let analyzed = reaction.slice(1,9) // trials 2–9

    let filtered = analyzed.filter(rt => rt <= 1000)

    let sum = filtered.reduce((a,b)=>a+b,0)

    let avgRT = filtered.length ? sum / filtered.length : 0

    document.getElementById("avgRT").textContent =
        avgRT.toFixed(1) + " ms"

}else{
    document.getElementById("avgRT").textContent = "No data"
}
    
// NBACK TEST real
let nbackSummary = JSON.parse(sessionStorage.getItem("nbackSummary"))

if(nbackSummary){

    let text =
    "Accuracy: " + (nbackSummary.accuracy*100).toFixed(1) + "%<br>" +
    "d′: " + nbackSummary.dprime.toFixed(2)

    document.getElementById("nbackscore").innerHTML = text

}else{
    document.getElementById("nbackscore").textContent = "No data"
}

//srtroop wawaawawawawwawawa
// STROOP TEST
let stroop2 = JSON.parse(sessionStorage.getItem("stroopSummary"))

if(stroop2){

    document.getElementById("stroop").innerHTML =
    "Accuracy: " + (stroop2.accuracy*100).toFixed(1) + "%<br>" +
    "Median RT: " + stroop2.medianRT.toFixed(0) + " ms"}

else{
    document.getElementById("stroop").textContent = "No data"
}
</script>

</body>
</html>
